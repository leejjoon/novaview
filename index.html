<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaView | Main Viewer Dashboard</title>
  
  <link rel="stylesheet" href="/src/style.css" />
  <!-- Aladin Lite v3 -->
  <link rel="stylesheet" href="/aladin.css" />
  <script type="text/javascript" src="/jquery.min.js" charset="utf-8"></script>
  

</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
  
  <!-- Capture all early errors -->
  <script type="module">
    import { invoke } from "/node_modules/@tauri-apps/api/core.js";
    window.addEventListener("error", (e) => {
      if (window.__TAURI_INTERNALS__) {
        invoke('log_message', { msg: `GLOBAL ERROR: ${e.message} at ${e.filename}:${e.lineno}` }).catch(console.error);
      } else {
        console.error(`GLOBAL ERROR: ${e.message} at ${e.filename}:${e.lineno}`);
      }
    });
    console.log("Global error handler installed via module");
  </script>

  <!-- TOP APP BAR -->
  <header data-tauri-drag-region class="fixed top-0 w-full z-50 flex items-center justify-between px-6 bg-[#10131a] dark:bg-[#10131a] border-b border-[#1d2026] h-12 transition-colors duration-150 ease-in-out select-none">
    <div class="flex items-center gap-8" data-tauri-drag-region>
      <span class="text-xl font-bold tracking-tighter text-[#c3f5ff] font-headline uppercase" data-tauri-drag-region>NovaView</span>
      <nav class="hidden md:flex items-center gap-6 font-headline tracking-tight text-sm uppercase">
        <a class="text-[#00e5ff] font-bold transition-colors duration-150 ease-in-out hover:bg-[#191c22] px-2 py-1" href="#" onclick="return false;">File</a>
        <a class="text-[#e1e2eb] opacity-70 transition-colors duration-150 ease-in-out hover:bg-[#191c22] hover:text-[#00e5ff] px-2 py-1" href="#" onclick="return false;">View</a>
        <a class="text-[#e1e2eb] opacity-70 transition-colors duration-150 ease-in-out hover:bg-[#191c22] hover:text-[#00e5ff] px-2 py-1" href="#" onclick="return false;">Windows</a>
        <a class="text-[#e1e2eb] opacity-70 transition-colors duration-150 ease-in-out hover:bg-[#191c22] hover:text-[#00e5ff] px-2 py-1" href="#" onclick="return false;">Help</a>
      </nav>
    </div>
    <div class="flex items-center gap-4 text-[#c3f5ff]">
      <div class="flex items-center gap-2 px-2 py-1 bg-surface-container-lowest rounded-full" data-tauri-drag-region>
        <span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_#c3f5ff]"></span>
        <span class="font-mono text-[10px] uppercase tracking-widest text-primary">WebSocket: Connected</span>
      </div>
      <button id="btn-reload-survey" title="Reload survey (no cache)" class="material-symbols-outlined text-[#c3f5ff] hover:bg-[#191c22] hover:text-[#00e5ff] p-1 transition-colors rounded" style="font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;">refresh</button>
      <button class="material-symbols-outlined text-[#c3f5ff] hover:bg-[#191c22] hover:text-[#00e5ff] p-1 transition-colors">sensors</button>
      <!-- Window controls (Tauri only) -->
      <div id="window-controls" class="hidden flex items-center gap-1 ml-2 pl-2 border-l border-[#1d2026]">
        <button id="btn-minimize" title="Minimize" class="material-symbols-outlined text-[#c3f5ff] hover:bg-[#191c22] hover:text-[#00e5ff] p-1 transition-colors rounded text-base leading-none">remove</button>
        <button id="btn-maximize" title="Maximize" class="material-symbols-outlined text-[#c3f5ff] hover:bg-[#191c22] hover:text-[#00e5ff] p-1 transition-colors rounded text-base leading-none">crop_square</button>
        <button id="btn-close" title="Close" class="material-symbols-outlined text-[#c3f5ff] hover:bg-red-800 hover:text-white p-1 transition-colors rounded text-base leading-none">close</button>
      </div>
    </div>
  </header>

  <!-- SIDE NAV BAR -->
  <aside class="fixed left-0 top-12 bottom-0 z-40 flex flex-col items-center py-4 bg-[#191c22] dark:bg-[#191c22] border-r border-[#1d2026] w-20">
    <div class="flex flex-col gap-6 items-center w-full">
      <!-- Dash: toggles Data Sources panel -->
      <button id="btn-toggle-data-sources" class="group flex flex-col items-center gap-1 w-full py-3 text-[#e1e2eb] opacity-50 hover:bg-[#1d2026] hover:opacity-100 scale-95 active:scale-90 transition-transform cursor-pointer border-l-2 border-transparent" title="Toggle Data Sources">
        <span class="material-symbols-outlined filled-icon text-2xl">dashboard</span>
        <span class="font-label text-[11px] font-medium uppercase text-center w-full block">Dash</span>
      </button>
      <div class="group flex flex-col items-center gap-1 w-full py-3 text-[#e1e2eb] opacity-50 hover:bg-[#1d2026] hover:opacity-100 scale-95 active:scale-90 transition-transform cursor-pointer">
        <span class="material-symbols-outlined text-2xl">functions</span>
        <span class="font-label text-[11px] font-medium uppercase text-center w-full block">Work</span>
      </div>
      <!-- Tool: toggles Analysis Toolkit panel -->
      <button id="btn-toggle-analysis" class="group flex flex-col items-center gap-1 w-full py-3 text-[#e1e2eb] opacity-50 hover:bg-[#1d2026] hover:opacity-100 scale-95 active:scale-90 transition-transform cursor-pointer border-l-2 border-transparent" title="Toggle Analysis Toolkit">
        <span class="material-symbols-outlined text-2xl">settings_input_component</span>
        <span class="font-label text-[11px] font-medium uppercase text-center w-full block">Tool</span>
      </button>
      <div class="group flex flex-col items-center gap-1 w-full py-3 text-[#e1e2eb] opacity-50 hover:bg-[#1d2026] hover:opacity-100 scale-95 active:scale-90 transition-transform cursor-pointer">
        <span class="material-symbols-outlined text-2xl">router</span>
        <span class="font-label text-[11px] font-medium uppercase text-center w-full block">Stat</span>
      </div>
    </div>
    <div class="mt-auto flex flex-col items-center opacity-30">
      <span class="font-mono text-[9px] rotate-180 [writing-mode:vertical-lr]">v1.0.4-beta</span>
    </div>
  </aside>

  <!-- MAIN CANVAS -->
  <main class="fixed inset-0 pt-12 pl-20 pb-8 bg-surface overflow-hidden">
    <div id="aladin-lite-container" class="absolute inset-0 bg-gradient-to-br from-surface to-surface-container-lowest z-0"></div>

    <!-- Grid Overlay SVG just for visual flair from template -->
    <svg class="absolute inset-0 w-full h-full opacity-10 pointer-events-none z-10" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern height="100" id="grid" patternunits="userSpaceOnUse" width="100">
          <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#c3f5ff" stroke-width="0.5"></path>
        </pattern>
      </defs>
      <rect fill="url(#grid)" height="100%" width="100%"></rect>
    </svg>

    <!-- LAYER MANAGER PANEL (Top Left of canvas) -->
    <div id="panel-data-sources" class="absolute top-16 left-24 w-72 glass-panel z-20 rounded-lg overflow-hidden flex flex-col max-h-[calc(100%-6rem)] hidden transition-all duration-300">
      <div class="bg-surface-container-high px-4 py-3 flex items-center justify-between border-b border-outline-variant/20">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-sm">layers</span>
          <span class="font-headline text-xs font-bold uppercase tracking-wider text-on-surface">Data Sources</span>
        </div>
        <button class="material-symbols-outlined text-on-surface-variant text-sm hover:text-primary transition-colors">add</button>
      </div>
      <div class="p-2 flex flex-col gap-1 overflow-y-auto">
        <!-- Layer Item 1 (Active) -->
        <div class="bg-surface-container p-3 rounded flex items-center gap-3 group">
          <div class="relative w-4 h-4 flex items-center justify-center">
            <input checked class="appearance-none w-4 h-4 border border-outline rounded-full checked:border-secondary checked:bg-transparent transition-all cursor-pointer" name="active_layer" type="radio" value="test_survey" />
            <div class="absolute w-1.5 h-1.5 bg-secondary rounded-full pointer-events-none opacity-0 group-has-[:checked]:opacity-100"></div>
          </div>
          <div class="flex-1">
            <p class="text-[11px] font-bold text-primary tracking-tight">Test HiPS</p>
            <p class="text-[9px] text-on-surface-variant font-mono">Local Data</p>
          </div>
          <div class="flex items-center gap-1 opacity-40 group-hover:opacity-100 transition-opacity">
            <button class="material-symbols-outlined text-sm">settings</button>
            <button class="material-symbols-outlined text-sm">visibility</button>
          </div>
        </div>
      </div>
    </div>

    <!-- FITS Analysis Toolkit Panel (Right) -->
    <div id="panel-analysis-toolkit" class="absolute right-6 top-16 bottom-12 w-72 flex flex-col gap-3 z-20 hidden transition-all duration-300">
      <div class="flex-1 glass-panel rounded-xl overflow-y-auto no-scrollbar px-4 py-4 flex flex-col gap-4 shadow-2xl">

        <!-- Header -->
        <div class="flex items-center justify-between border-b border-outline-variant/20 pb-2.5">
          <h2 class="font-headline font-bold text-sm text-primary tracking-widest uppercase">Analysis Toolkit</h2>
          <span class="material-symbols-outlined text-primary/30 text-base">science</span>
        </div>

        <!-- Format Selector -->
        <section class="space-y-1.5" id="format-selector-section">
          <div class="flex items-center justify-between">
            <label class="text-[9px] uppercase tracking-[0.2em] font-bold text-primary/60">Data Format</label>
            <span id="label-format-auto" class="text-[9px] text-secondary font-mono tracking-wider italic">Auto: FITS</span>
          </div>
          <div class="grid grid-cols-2 gap-1.5" id="format-toggles">
            <button data-format="jpeg" class="format-btn flex items-center gap-1.5 px-2 py-1.5 bg-surface-container-low rounded border-l-2 border-primary text-[11px] font-mono text-primary disabled:opacity-30 disabled:cursor-not-allowed">
              <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span> JPEG
            </button>
            <button data-format="fits" class="format-btn flex items-center gap-1.5 px-2 py-1.5 bg-surface-container-lowest rounded border-l-2 border-transparent text-[11px] font-mono text-on-surface/60 hover:bg-surface-container-high transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
              <span class="material-symbols-outlined text-sm">radio_button_unchecked</span> FITS
            </button>
          </div>
        </section>

        <!-- Colormap Selector -->
        <section class="space-y-1.5">
          <label class="text-[9px] uppercase tracking-[0.2em] font-bold text-primary/60">Colormap</label>
          <select id="colormap-select" class="w-full bg-surface-container-lowest px-2.5 py-2 rounded-lg border border-outline-variant/20 text-[11px] hover:border-primary/50 transition-colors text-white focus:ring-1 focus:ring-primary focus:outline-none appearance-none font-mono cursor-pointer">
            <option value="viridis">Viridis</option>
            <option value="plasma">Plasma</option>
            <option value="magma">Magma</option>
            <option value="inferno">Inferno</option>
            <option value="cividis">Cividis</option>
            <option value="greyscale">Greyscale</option>
          </select>
        </section>

        <!-- Scaling Controls -->
        <section class="space-y-1.5">
          <label class="text-[9px] uppercase tracking-[0.2em] font-bold text-primary/60">Scaling</label>
          <div class="grid grid-cols-2 gap-1.5" id="scaling-toggles">
            <button data-scale="linear" class="scale-btn flex items-center gap-1.5 px-2 py-1.5 bg-surface-container-low rounded border-l-2 border-primary text-[11px] font-mono text-primary">
              <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span> Linear
            </button>
            <button data-scale="log" class="scale-btn flex items-center gap-1.5 px-2 py-1.5 bg-surface-container-lowest rounded border-l-2 border-transparent text-[11px] font-mono text-on-surface/60 hover:bg-surface-container-high transition-colors">
              <span class="material-symbols-outlined text-sm">radio_button_unchecked</span> Log
            </button>
            <button data-scale="asinh" class="scale-btn flex items-center gap-1.5 px-2 py-1.5 bg-surface-container-lowest rounded border-l-2 border-transparent text-[11px] font-mono text-on-surface/60 hover:bg-surface-container-high transition-colors">
              <span class="material-symbols-outlined text-sm">radio_button_unchecked</span> Asinh
            </button>
            <button data-scale="squared" class="scale-btn flex items-center gap-1.5 px-2 py-1.5 bg-surface-container-lowest rounded border-l-2 border-transparent text-[11px] font-mono text-on-surface/60 hover:bg-surface-container-high transition-colors">
              <span class="material-symbols-outlined text-sm">radio_button_unchecked</span> Squared
            </button>
          </div>
        </section>

        <!-- Dynamic Range -->
        <section class="space-y-1.5">
          <label class="text-[9px] uppercase tracking-[0.2em] font-bold text-primary/60">Dynamic Range</label>
          <div class="grid grid-cols-2 gap-2">
            <div class="relative">
              <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] font-mono text-on-surface/40 pointer-events-none">min</span>
              <input id="input-vmin" class="w-full bg-surface-container-lowest border border-outline-variant/20 text-[11px] font-mono pl-7 pr-2 py-2 rounded-lg focus:ring-1 focus:ring-primary focus:outline-none text-primary" type="number" step="0.1" value="-0.5" />
            </div>
            <div class="relative">
              <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] font-mono text-on-surface/40 pointer-events-none">max</span>
              <input id="input-vmax" class="w-full bg-surface-container-lowest border border-outline-variant/20 text-[11px] font-mono pl-7 pr-2 py-2 rounded-lg focus:ring-1 focus:ring-primary focus:outline-none text-secondary" type="number" step="0.1" value="15.0" />
            </div>
          </div>
        </section>

        <!-- Action Buttons -->
        <div class="grid grid-cols-3 gap-1.5 pt-3 border-t border-outline-variant/10 mt-auto">
          <button id="btn-invert" class="flex flex-col items-center justify-center gap-1 py-2 bg-surface-container-high hover:bg-surface-bright rounded text-[10px] font-mono transition-all">
            <span class="material-symbols-outlined text-sm">invert_colors</span>
            Invert
          </button>
          <button id="btn-reset" class="flex flex-col items-center justify-center gap-1 py-2 bg-surface-container-high hover:bg-surface-bright rounded text-[10px] font-mono transition-all">
            <span class="material-symbols-outlined text-sm">refresh</span>
            Reset
          </button>
          <button id="btn-apply-cuts" class="flex flex-col items-center justify-center gap-1 py-2 bg-primary/20 hover:bg-primary/30 border border-primary/30 rounded text-[10px] font-mono text-primary transition-all">
            <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">tune</span>
            Apply
          </button>
        </div>
      </div>

      <!-- Coordinate Panel (Lower Right) -->
      <div class="glass-panel rounded-xl px-3 py-2.5 shadow-xl">
        <div class="flex items-center justify-between gap-4">
          <div class="flex flex-col">
            <span class="text-[9px] uppercase tracking-widest text-primary/60 font-mono">Center RA/Dec</span>
            <span id="label-center-radec" class="font-mono text-primary text-xs font-medium">--</span>
          </div>
          <div class="flex flex-col text-right">
            <span class="text-[9px] uppercase tracking-widest text-secondary/60 font-mono">Field of View</span>
            <span id="label-fov" class="text-xs font-mono text-secondary">--°</span>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- FOOTER STATUS BAR -->
  <footer class="fixed bottom-0 w-full z-50 flex items-center justify-between px-4 bg-[#0b0e14] dark:bg-[#0b0e14] border-t border-[#1d2026] h-8 font-mono text-[10px] tracking-widest uppercase text-[#c3f5ff]">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <span class="text-primary-fixed-dim">System Status:</span>
        <span class="text-[#00e5ff]">Nominal</span>
      </div>
      <div class="w-[1px] h-3 bg-outline-variant/30"></div>
      <a class="text-[#e1e2eb] opacity-60 hover:text-[#00e5ff] transition-colors" href="#">System Logs</a>
    </div>
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-2">
        <span class="text-on-surface-variant">Active Layer:</span>
        <span class="text-secondary" id="footer-active-layer">N/A</span>
      </div>
    </div>
  </footer>

  <!-- Aladin Lite library must be loaded after jquery and HTML structure -->
  <script type="text/javascript" src="/aladin.js" charset="utf-8"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
